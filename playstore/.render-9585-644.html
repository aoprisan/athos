<!doctype html><html><head><meta charset="utf-8"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"><style>html,body{margin:0;padding:0;background:transparent;width:24px;height:24px;overflow:hidden}svg{display:block;width:24px;height:24px}</style></head><body><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <title>Athos Pilgrim — notification icon</title>
  <!--
    Android status-bar notification icons must be solid white on transparent;
    the system tints them. Use the Athonite cross silhouette: simplest,
    most legible at 24dp.
  -->
  <g fill="#ffffff">
    <rect x="11" y="2"  width="2"   height="20"/>
    <rect x="7"  y="6"  width="10"  height="2"/>
    <rect x="5"  y="10" width="14"  height="2"/>
    <polygon points="8,16 16,15 16,17.5 8,18.5"/>
  </g>
</svg>
</body></html>
