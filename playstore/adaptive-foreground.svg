<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <title>Athos Pilgrim — adaptive icon foreground</title>
  <!--
    Adaptive icon safe zone is the central 264×264 region (66% of 432).
    Critical elements (peak silhouette + cross) sit inside that. The forest
    and sea bands extend toward the bleed where launchers may crop or
    parallax. No solid background — this layer composites over
    adaptive-background.svg.
  -->
  <defs>
    <linearGradient id="peak2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c9b078"/>
      <stop offset="22%" stop-color="#a04030"/>
      <stop offset="62%" stop-color="#7e2b22"/>
      <stop offset="100%" stop-color="#4a0f1a"/>
    </linearGradient>
    <linearGradient id="peakShade2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="forest2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7c9560"/>
      <stop offset="60%" stop-color="#5a7a45"/>
      <stop offset="100%" stop-color="#3e5530"/>
    </linearGradient>
    <linearGradient id="sea2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#a3b6be"/>
      <stop offset="100%" stop-color="#5a7886"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6e198"/>
      <stop offset="48%" stop-color="#d6ad32"/>
      <stop offset="100%" stop-color="#7a5b12"/>
    </linearGradient>
  </defs>

  <!-- Sea band (extends to bleed) -->
  <path d="M 0 372 Q 108 358 216 366 Q 324 374 432 360 L 432 432 L 0 432 Z" fill="url(#sea2)" opacity="0.96"/>
  <g stroke="#f0e3c4" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M 32 392 Q 48 386 64 392 T 96 392"/>
    <path d="M 132 402 Q 148 396 164 402 T 196 402"/>
    <path d="M 244 396 Q 260 390 276 396 T 308 396"/>
    <path d="M 336 408 Q 352 402 368 408 T 400 408"/>
    <path d="M 72 416 Q 88 410 104 416 T 136 416"/>
    <path d="M 220 420 Q 236 414 252 420 T 284 420"/>
  </g>

  <!-- Forest base (mostly in safe zone, edges may crop) -->
  <path d="M 28 382 Q 100 358 168 374 Q 216 350 264 374 Q 332 358 404 382 L 404 404 L 28 404 Z" fill="url(#forest2)"/>

  <!-- Peak silhouette: pyramid widening to forest line -->
  <path d="M 216 82
           C 207 168, 187 244, 142 354
           Q 128 378 154 384
           L 216 390
           L 280 384
           Q 304 378 290 354
           C 245 244, 225 168, 216 82
           Z" fill="url(#peak2)"/>
  <path d="M 216 82
           L 216 390
           L 280 384
           Q 304 378 290 354
           C 245 244, 225 168, 216 82
           Z" fill="url(#peakShade2)" opacity="0.55"/>

  <!-- Snow cap — only the summit -->
  <path d="M 216 82
           C 213 110, 207 134, 200 152
           Q 208 158 216 158
           Q 224 158 232 152
           C 225 134, 219 110, 216 82
           Z" fill="#fbf5e6" opacity="0.95"/>
  <path d="M 216 82 L 216 158 Q 224 158 232 152 C 225 134, 219 110, 216 82 Z"
        fill="#000" opacity="0.18"/>

  <!-- Painted contour -->
  <path d="M 216 82
           C 207 168, 187 244, 142 354
           Q 128 378 154 384
           L 216 390
           L 280 384
           Q 304 378 290 354
           C 245 244, 225 168, 216 82 Z"
        fill="none" stroke="#2e2618" stroke-width="2" stroke-linejoin="round" opacity="0.78"/>

  <!-- Crowning cross -->
  <g stroke="url(#gold2)" stroke-width="6" stroke-linecap="square" fill="none">
    <line x1="216" y1="26" x2="216" y2="84"/>
    <line x1="194" y1="44" x2="238" y2="44"/>
    <line x1="184" y1="58" x2="248" y2="58"/>
    <line x1="198" y1="76" x2="234" y2="70"/>
  </g>
  <g stroke="#fff3c4" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.7">
    <line x1="214" y1="30" x2="214" y2="80"/>
  </g>
</svg>
