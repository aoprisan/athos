<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432 432" width="432" height="432">
  <title>Athos Pilgrim — adaptive icon background</title>
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.55" r="0.85">
      <stop offset="0%"  stop-color="#2a3a72"/>
      <stop offset="55%" stop-color="#18254e"/>
      <stop offset="100%" stop-color="#060a1e"/>
    </radialGradient>
    <pattern id="dust" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="6"  cy="10" r="0.7" fill="#f5e08e" opacity="0.5"/>
      <circle cx="34" cy="4"  r="0.5" fill="#fff3c4" opacity="0.4"/>
      <circle cx="22" cy="28" r="0.9" fill="#d6ad32" opacity="0.45"/>
      <circle cx="42" cy="38" r="0.5" fill="#f5e08e" opacity="0.35"/>
    </pattern>
    <radialGradient id="halo" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0%"  stop-color="#f5e08e" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d6ad32" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6f4f0e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="432" height="432" fill="url(#bg)"/>
  <rect width="432" height="432" fill="url(#dust)" opacity="0.6"/>
  <circle cx="216" cy="238" r="170" fill="url(#halo)"/>
</svg>
