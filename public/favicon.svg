<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="dome-sky" cx="0.5" cy="0.85" r="0.9">
      <stop offset="0%" stop-color="#3a4a8c" />
      <stop offset="55%" stop-color="#162347" />
      <stop offset="100%" stop-color="#070d22" />
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6e198" />
      <stop offset="50%" stop-color="#d6ad32" />
      <stop offset="100%" stop-color="#7a5b12" />
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff3c4" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#d6ad32" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#d6ad32" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#dome-sky)" />
  <circle cx="32" cy="28" r="22" fill="url(#halo)" />
  <!-- dome -->
  <path d="M14 50 Q14 28 32 18 Q50 28 50 50 Z" fill="#0f1838" stroke="url(#gold)" stroke-width="1.2"/>
  <!-- dome ribs -->
  <path d="M32 18 V50 M22 22 Q22 36 22 50 M42 22 Q42 36 42 50" stroke="url(#gold)" stroke-width="0.6" fill="none" opacity="0.6"/>
  <!-- byzantine cross atop -->
  <g stroke="url(#gold)" stroke-width="1.4" stroke-linecap="square" fill="none">
    <line x1="32" y1="4" x2="32" y2="20"/>
    <line x1="26" y1="9" x2="38" y2="9"/>
    <line x1="24" y1="13" x2="40" y2="13"/>
    <line x1="28" y1="18" x2="36" y2="16"/>
  </g>
  <!-- base bar -->
  <rect x="12" y="50" width="40" height="3" fill="url(#gold)"/>
  <rect x="11" y="53" width="42" height="1" fill="#7a5b12"/>
</svg>
